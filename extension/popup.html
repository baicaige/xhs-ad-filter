<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>XHS Ad Filter</title>
  <style>
    body { width: 300px; margin: 0; padding: 14px; font: 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #17202a; }
    h1 { font-size: 18px; margin: 0 0 12px; letter-spacing: 0; }
    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
    .stat { background: #eef3f8; border-radius: 8px; padding: 10px; }
    .stat strong { display: block; font-size: 22px; }
    button { width: 100%; border: 0; border-radius: 6px; padding: 10px; background: #0f766e; color: #fff; font-weight: 650; cursor: pointer; }
    button + button { margin-top: 8px; background: #e7edf2; color: #1d2939; }
    p { color: #667085; margin: 10px 0 0; }
  </style>
</head>
<body>
  <h1>XHS Ad Filter</h1>
  <div class="stats">
    <div class="stat"><span>已拦截</span><strong id="blocked">0</strong></div>
    <div class="stat"><span>待审核</span><strong id="pending">0</strong></div>
    <div class="stat"><span>已上报</span><strong id="reported">0</strong></div>
    <div class="stat"><span>命中率</span><strong id="hitRate">-</strong></div>
  </div>
  <button id="refresh">刷新规则</button>
  <button id="options">打开设置</button>
  <p id="updated">尚未同步规则</p>
  <p id="reportError"></p>
  <script src="popup.js"></script>
</body>
</html>
